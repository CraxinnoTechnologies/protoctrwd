/* -------- App -------- */
function App() {
  const [tweaks, setTweaks] = useState(() => {
    const saved = localStorage.getItem('ld-tweaks');
    return saved ? { ...TWEAK_DEFAULTS, ...JSON.parse(saved) } : TWEAK_DEFAULTS;
  });
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [query, setQuery] = useState('');

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme);
    localStorage.setItem('ld-tweaks', JSON.stringify(tweaks));
  }, [tweaks]);

  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode') setTweaksOpen(true);
      if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent?.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  useEffect(() => { window.lucide?.createIcons?.(); });

  const update = (patch) => {
    setTweaks(t => ({ ...t, ...patch }));
    window.parent?.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  const filtered = useMemo(() => {
    let r = LEADS;
    if (tweaks.filter !== 'all') r = r.filter(l => l.status === tweaks.filter);
    const q = query.trim().toLowerCase();
    if (q) r = r.filter(l => (l.title+l.name+l.company+l.email+l.phone).toLowerCase().includes(q));
    return r;
  }, [tweaks.filter, query]);

  return (
    <div>
      <div className="sticky top-0 z-50 flex items-center justify-between px-6 py-3.5 bg-background border-b border-border">
        <div className="flex items-baseline gap-2.5 text-[15px]">
          <b className="font-semibold">Leads Dashboard</b>
          <span className="text-zinc300">·</span>
          <span className="text-muted-foreground text-[14px]">shadcn redesign — V3 (Tailwind)</span>
        </div>
        <button onClick={() => setTweaksOpen(v => !v)} className="h-[34px] px-3 rounded-md border border-border bg-background text-foreground text-[13px] font-medium inline-flex items-center gap-1.5 shadow-xs hover:bg-accent cursor-pointer">
          <Icon name="sliders-horizontal" size={13} /> Tweaks
        </button>
      </div>

      <div className="max-w-[1320px] mx-auto p-6">
        <div className="bg-background border border-border rounded-[14px] shadow-[0_1px_3px_0_rgba(0,0,0,0.08),0_1px_2px_-1px_rgba(0,0,0,0.08)] overflow-hidden grid grid-cols-[220px_1fr] min-h-[780px]">
          <Sidebar />
          <section className="p-5 sm:p-[22px_26px_28px] overflow-hidden">
            <PageHead />
            <StatsV3 counts={COUNTS} />
            <FilterRow
              view={tweaks.view} setView={v => update({ view: v })}
              filter={tweaks.filter} setFilter={f => update({ filter: f })}
              query={query} setQuery={setQuery}
              counts={COUNTS}
            />
            {tweaks.view === 'grid' ? (
              <div className="grid grid-cols-4 max-[1160px]:grid-cols-3 max-[900px]:grid-cols-2 gap-3">
                {filtered.map(l => <CardV3 key={l.id} lead={l} />)}
              </div>
            ) : (
              <ListView leads={filtered} />
            )}
            {filtered.length === 0 && (
              <div className="p-12 text-center text-muted-foreground border border-dashed border-border rounded-[10px] bg-card">
                <Icon name="search-x" size={22} className="text-muted-foreground mb-2" />
                <div className="font-medium text-foreground mb-1">No follow-ups found</div>
                <div className="text-[13px]">Try a different filter or clear your search.</div>
              </div>
            )}
          </section>
        </div>
      </div>

      {tweaksOpen && <TweaksPanel tweaks={tweaks} update={update} onClose={() => setTweaksOpen(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
